<header class="dialog-header">
  <div
    class="icon"
    [class.icon-success]="data.type === 'activate'"
    [class.icon-warning]="data.type === 'deactivate'"
    [class.icon-error]="data.type === 'delete'"
    aria-hidden="true"
  >
    @switch (data.type) {
      @case ('activate') {
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="6 4 20 12 6 20 6 4" />
        </svg>
      }
      @case ('deactivate') {
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="6" y="4" width="4" height="16" />
          <rect x="14" y="4" width="4" height="16" />
        </svg>
      }
      @case ('delete') {
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" />
        </svg>
      }
    }
  </div>
  <h1 mat-dialog-title class="dialog-title">{{ data.title }}</h1>
</header>

<div mat-dialog-content class="dialog-content">
  <p>{{ data.content }}</p>
</div>

<div mat-dialog-actions class="dialog-actions">
  <button type="button" class="btn btn-outline" [mat-dialog-close]="false">
    Cancelar
  </button>
  <button
    type="button"
    class="btn"
    [class.btn-success]="data.type === 'activate'"
    [class.btn-warning]="data.type === 'deactivate'"
    [class.btn-danger]="data.type === 'delete'"
    [mat-dialog-close]="true"
  >
    {{ confirmLabel }}
  </button>
</div>
